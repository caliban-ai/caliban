name: publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: cargo publish --workspace
    # Guard 1: never run anywhere but the canonical public repo.
    if: github.repository == 'caliban-ai/caliban'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches workspace version
        # Guard 3: tag v0.1.0 must equal the workspace package version.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws="$(cargo metadata --no-deps --format-version 1 \
                | jq -r '.packages[] | select(.name=="caliban") | .version')"
          echo "tag=$tag workspace=$ws"
          if [ "$tag" != "$ws" ]; then
            echo "::error::tag v$tag does not match workspace version $ws"
            exit 1
          fi

      - name: Publish to crates.io
        # Guard 2: token exists ONLY as a secret in caliban-ai/caliban (repo or
        # org). scripts/publish.sh publishes crates not yet on the registry, in
        # dependency order, with --no-verify (CI's package-check already verified
        # packaging — no recompile here). MAX_SLEEP_SECS=0 means the runner never
        # idles on a crates.io new-crate 429: it publishes what the burst allows
        # and exits non-zero. Finish the rest locally by running scripts/publish.sh
        # (which sleeps through the rate-limit windows for free). See docs/releasing.md.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          MAX_SLEEP_SECS: "0"
        run: bash scripts/publish.sh
