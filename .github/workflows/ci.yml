name: ci

on:
  # Run on every PR so the required status check always reports. Whether the
  # expensive cargo steps actually run is decided per-PR by the `changes` step
  # below — docs-only PRs skip them and the job still goes green. (We can't make
  # the branch ruleset path-aware, so the check itself must always report.)
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · build · test (default features)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      code: ${{ steps.changes.outputs.code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Decide whether this change touches anything that needs Rust CI. On a PR
      # that only edits docs/markdown/license, the cargo steps below are skipped
      # and the job still succeeds — satisfying the required check without a
      # full workspace build. Anything else (or a non-PR event) runs the lot.
      - name: Detect non-docs changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only \
               "${{ github.event.pull_request.base.sha }}" \
               "${{ github.event.pull_request.head.sha }}" \
             | grep -vqE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/|\.github/workflows/docs\.yml$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain (from rust-toolchain.toml)
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        if: steps.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: steps.changes.outputs.code == 'true'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: steps.changes.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        if: steps.changes.outputs.code == 'true'
        run: cargo build --workspace --all-targets

      - name: cargo test
        if: steps.changes.outputs.code == 'true'
        run: cargo test --workspace

      - name: Docs-only change — Rust CI skipped
        if: steps.changes.outputs.code != 'true'
        run: echo "Only docs/markdown/license changed; skipping cargo fmt/clippy/build/test."

  coverage:
    name: line-coverage gate
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Needed for the sticky coverage comment on pull requests.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # llvm-tools-preview provides llvm-cov / llvm-profdata, which
      # cargo-llvm-cov drives. On CI this comes from rustup (unlike the
      # Homebrew-toolchain workaround documented in scripts/coverage.sh).
      - name: Install Rust toolchain (from rust-toolchain.toml)
        if: needs.check.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry & target
        if: needs.check.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        if: needs.check.outputs.code == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # scripts/coverage.sh is the single entrypoint: it writes the LCOV + JSON
      # reports, then fails when line coverage drops below its COVERAGE_MIN floor.
      # The reports are written before the gate, so the comment/summary steps
      # below still run (via !cancelled()) and report on a failing run too.
      - name: Run coverage gate
        if: needs.check.outputs.code == 'true'
        run: scripts/coverage.sh
      # Render the JSON export into Markdown once and reuse it for both the job
      # summary (visible on every run, incl. push) and the sticky PR comment.
      - name: Render coverage report
        if: ${{ !cancelled() && needs.check.outputs.code == 'true' }}
        run: |
          python3 scripts/coverage-report.py target/llvm-cov/coverage.json \
            --commit "${{ github.sha }}" --floor 85 > coverage-comment.md
          cat coverage-comment.md >> "$GITHUB_STEP_SUMMARY"
      # Post/update a single sticky comment on PRs. Skipped for forks, whose
      # GITHUB_TOKEN is read-only and can't comment.
      - name: Post coverage comment
        if: ${{ !cancelled() && needs.check.outputs.code == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage-comment.md
      - name: Upload coverage reports
        if: ${{ !cancelled() && needs.check.outputs.code == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/llvm-cov/lcov.info
            target/llvm-cov/coverage.json
          if-no-files-found: error
      - name: Docs-only change — coverage skipped
        if: needs.check.outputs.code != 'true'
        run: echo "Only docs/markdown/license changed; skipping coverage."

  package-check:
    name: cargo publish --workspace --dry-run
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Rust toolchain (from rust-toolchain.toml)
        if: needs.check.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & target
        if: needs.check.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2
      - name: Verify all crates package cleanly
        if: needs.check.outputs.code == 'true'
        run: cargo publish --workspace --dry-run
      - name: Docs-only change — package-check skipped
        if: needs.check.outputs.code != 'true'
        run: echo "Only docs/markdown/license changed; skipping package dry-run."
