name: ci-cloud

on:
  push:
    branches: ["**"]
    paths:
      - 'crates/caliban-provider-anthropic/src/transport/bedrock.rs'
      - 'crates/caliban-provider-anthropic/src/transport/vertex.rs'
      - 'crates/caliban-provider-google/src/transport/vertex.rs'
      - 'crates/caliban-provider-openai/src/transport/azure.rs'
      - 'crates/caliban-provider-anthropic/src/config.rs'
      - 'crates/caliban-provider-google/src/config.rs'
      - 'crates/caliban-provider-openai/src/config.rs'
      - 'Cargo.lock'
      - '.github/workflows/ci-cloud.yml'
  pull_request:
    branches: ["**"]
    paths:
      - 'crates/caliban-provider-anthropic/src/transport/bedrock.rs'
      - 'crates/caliban-provider-anthropic/src/transport/vertex.rs'
      - 'crates/caliban-provider-google/src/transport/vertex.rs'
      - 'crates/caliban-provider-openai/src/transport/azure.rs'
      - 'crates/caliban-provider-anthropic/src/config.rs'
      - 'crates/caliban-provider-google/src/config.rs'
      - 'crates/caliban-provider-openai/src/config.rs'
      - 'Cargo.lock'
      - '.github/workflows/ci-cloud.yml'
  # Manual re-trigger — useful when a PR touched the `caliban` binary's
  # provider-construction wiring (which the path filter above doesn't
  # match) and the cloud-features build needs a fresh run against the
  # current branch tip.
  workflow_dispatch:

concurrency:
  group: ci-cloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-cloud:
    name: build + test (bedrock + vertex + azure features)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Free runner disk
        # The cloud-features build pulls a large dependency closure
        # (aws-sdk-bedrockruntime, libgit2, axum, oauth2, image, etc.)
        # that overflows the default GHA disk (~14 GB free). Drop the
        # bundled .NET / Android / Haskell / large Docker images that
        # we don't use to free ~30 GB before checkout.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo build  --workspace --features caliban-provider-anthropic/bedrock,caliban-provider-anthropic/vertex,caliban-provider-openai/azure,caliban-provider-google/vertex
          cargo clippy --workspace --features caliban-provider-anthropic/bedrock,caliban-provider-anthropic/vertex,caliban-provider-openai/azure,caliban-provider-google/vertex --all-targets -- -D warnings
          cargo test   --workspace --features caliban-provider-anthropic/bedrock,caliban-provider-anthropic/vertex,caliban-provider-openai/azure,caliban-provider-google/vertex
