[package]
name        = "caliban"
version     = "0.0.0"
description = "User-facing binary for the caliban agent harness"
edition.workspace      = true
license.workspace      = true
authors.workspace      = true
rust-version.workspace = true
publish     = false

[[bin]]
name = "caliban"
path = "src/main.rs"

[dependencies]
caliban-provider           = { path = "../crates/caliban-provider" }
caliban-provider-anthropic = { path = "../crates/caliban-provider-anthropic" }
caliban-provider-openai    = { path = "../crates/caliban-provider-openai" }
caliban-provider-ollama    = { path = "../crates/caliban-provider-ollama" }
caliban-provider-google    = { path = "../crates/caliban-provider-google" }
caliban-agent-core         = { path = "../crates/caliban-agent-core" }
caliban-sessions           = { path = "../crates/caliban-sessions" }
caliban-tools-builtin      = { path = "../crates/caliban-tools-builtin" }
anyhow                     = { workspace = true }
clap                       = { version = "4", features = ["derive"] }
tokio                      = { workspace = true, features = ["full"] }
tokio-util                 = { workspace = true }
futures                    = { workspace = true }
rustyline                  = "14"
dirs                       = { workspace = true }

[dev-dependencies]
caliban-provider = { path = "../crates/caliban-provider", features = ["mock"] }
tempfile         = { workspace = true }
tokio-util       = { workspace = true }

[lints]
workspace = true
